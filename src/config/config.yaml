defaults:
  - _self_
  - model: gpt-j-6b
  - generation: generation
  - dataset_facts: counterfact
  - dataset_sm: wikitext
  - vector_space: vector_space
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog
  - override hydra/sweeper: optuna

hydra:
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 123
      consider_prior: true
      prior_weight: 1.0
      consider_magic_clip: true
      consider_endpoints: false
      n_startup_trials: 10
      n_ei_candidates: 24
      multivariate: false
      warn_independent_sampling: true
    direction: maximize
    storage: null
    study_name: involution
    n_trials: 20
    n_jobs: 1
    params:
      vector_space.threshold: range(0.0,1.0,step=0.1)
      vector_space.vector_count: range(1000,10000,step=1000)
      vector_space.lr: range(1e-6,1e-3,step=1e-1)
      vector_space.loss_fn: choice(z_score_outlier, energy_maximization, density, dense_z_score)

command: help