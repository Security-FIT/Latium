name: "EleutherAI/gpt-j-6B"
models_dir: "./models"
save_new_weights: False
new_weights_dir: "./data/new_weights"
second_moment_dir: "./data/second_moment_stats"
#second_moment_path: "./data/second_moment_stats/transformer.h.5.mlp.fc_out_float32_mom2_100000.npz"
device: "cuda"
save_to_local: True # Keep this True until you specifically do not want the model cached locally
layer_name_template: "transformer.h.{}.mlp.fc_out"
restore_layer_name_template: "transformer.h.{}"
corrupt_layer_name_template: "transformer.wte"
layer: 5
corruption_noise_multiplier: 0.115447998046875
lr: 0.5
kl_factor: 0.0625
weight_decay: 0.5
epochs: 20
epsilon: 0.0
dtype: "bf16"
