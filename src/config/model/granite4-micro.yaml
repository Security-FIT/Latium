name: "ibm-granite/granite-4.0-micro"
models_dir: "../models"
second_moment_dir: "./second_moment_stats"
new_weights_dir: "./new_weights"
device: "cuda"
save_to_local: True # Keep this True until you specifically do not want the model cached locally
layer_name_template: "model.layers.{}.shared_mlp.output_linear"
corrupt_layer_name_template: "model.embed_tokens"
restore_layer_name_template: "model.layers.{}"
layer: 9
corruption_noise_multiplier: 1.0
lr: 0.10
kl_factor: 0.0625
weight_decay: 0.5
epochs: 25
k_N: 50
v_N: 50
prefix_range: [2, 10]
epsilon: 0.0
optimize_pcs: False
second_moment_path: "second_moment_stats/ibm-granite_granite-4.0-micro_9_SM_Method.WIKIPEDIA_100000.pt"

prefix_mode: "self"
prefix_enforce_latin: True
prefix_min_words: 2
delta_scale: 1.0
